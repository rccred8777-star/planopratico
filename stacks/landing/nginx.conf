server {
    listen 80;
    server_name planopratico.shop www.planopratico.shop;

    location /dogflow/obrigado {
        alias /var/www/landing/dogflow-xixi;
        try_files /obrigado.html =404;
    }

    location /dogflow {
        alias /var/www/landing/dogflow-xixi/;
        index index.html;
    }

    location /quiz {
        alias /var/www/landing/quiz/;
        index index.html;
    }

    location = / {
        root /var/www/landing;
        try_files /index.html =404;
    }

    location / {
        return 301 /dogflow;
    }
}
