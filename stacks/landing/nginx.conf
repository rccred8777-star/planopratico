server {
    listen 80;
    server_name planopratico.shop www.planopratico.shop;

    location /dogflow/obrigado {
        alias /var/www/landing/dogflow-xixi;
        try_files /obrigado.html =404;
    }
    location /dogflow {
        alias /var/www/landing/dogflow-xixi/;
        index index.html;
    }
    location /quiz {
        alias /var/www/landing/quiz/;
        index index.html;
    }
    location = /privacidade {
        root /var/www/landing;
        try_files /privacidade.html =404;
    }
    location = / {
        root /var/www/landing;
        try_files /index.html =404;
    }
    location / {
        root /var/www/landing;
        try_files $uri $uri/ @fallback;
    }
    location @fallback {
        return 301 /dogflow;
    }
}

server {
    listen 80;
    server_name estanciaequilibrio.com.br www.estanciaequilibrio.com.br;
    root /var/www/landing/eliane;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
