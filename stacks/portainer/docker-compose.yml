version: "3.8"

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/planopratico/volumes/portainer_data:/data
    networks:
      - planopratico_net

networks:
  planopratico_net:
    external: true
