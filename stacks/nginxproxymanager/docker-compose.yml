version: "3.8"

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - /opt/planopratico/volumes/npm_data:/data
      - /opt/planopratico/volumes/npm_letsencrypt:/etc/letsencrypt
    networks:
      - planopratico_net

networks:
  planopratico_net:
    external: true
